<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Колода карт</title>
<style>
  html {
    margin: 0;
    height: 100%;
  }

  body {
    margin: 0;
    height: 100%;
    background: radial-gradient(circle at 50% 30%, #1a1a1a, #000000 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, sans-serif;
  }

  #title {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: #f0d9a0;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 1px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    white-space: nowrap;
  }

  #scene {
    position: relative;
    width: 280px;
    height: 392px;
    perspective: 1200px;
  }

  .card {
    position: absolute;
    top: 0;
    left: 0;
    width: 280px;
    height: 392px;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    cursor: pointer;
    transition: transform 0.6s cubic-bezier(.4,.2,.2,1);
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(.6,.1,.2,1);
  }

  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .face {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    overflow: hidden;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

    background-position: center;

    border: 3px solid #d9a441;
  }

  .front {
    background: #ffe3ec;
    transform: rotateY(180deg);
    border: 3px solid #d9a441;
    padding: 0;
  }

  .front-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(.4,.2,.2,1);
  }

  .front-inner.slot-flipped {
    transform: rotateY(180deg);
  }

  .front-face, .front-back-face {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    padding: 32px;
    text-align: center;
  }

  .front-back-face {
    transform: rotateY(180deg);
    background: #ffe3ec;
  }

  .date {
    font-size: 38px;
    font-weight: 800;
    color: #3a2a1a;
    letter-spacing: 1px;
    text-shadow: 0 1px 0 rgba(255,255,255,0.5);
  }

  .slot-title {
    font-size: 19px;
    font-weight: 700;
    color: #7a1f3d;
    margin-bottom: 10px;
    line-height: 1.4;
  }

  .slot-time {
    font-size: 28px;
    font-weight: 800;
    color: #3a2a1a;
    margin-bottom: 24px;
    white-space: nowrap;
  }

  .btn {
    margin-top: 22px;
    padding: 13px 28px;
    background: linear-gradient(145deg, #e0b15a, #b9842a);
    color: #fff;
    border: none;
    border-radius: 28px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  }

  .btn:active {
    transform: scale(0.96);
  }

  .go-btn {
    text-decoration: none;
    display: inline-block;
  }

  .btn:disabled {
    opacity: 0.7;
    cursor: default;
  }

  .loading-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .spinner {
    width: 38px;
    height: 38px;
    border: 4px solid rgba(122, 31, 61, 0.15);
    border-top-color: #b9842a;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin-bottom: 22px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-size: 16px;
    font-weight: 700;
    color: #7a1f3d;
    line-height: 1.5;
    min-height: 48px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .loading-text.visible {
    opacity: 1;
  }

  #hint {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: #aaa;
    font-size: 14px;
    letter-spacing: 0.5px;
    white-space: nowrap;
    animation: pulse 1.8s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Leopard pattern via SVG background */
  .leopard-bg {
    position: absolute;
    inset: 0;
    background-color: #1c1c1c;
  }
</style>
</head>
<body>

<div id="title">Выбери карту судьбы</div>
<div id="scene"></div>
<div id="hint">Нажми на колоду</div>

<script>
const scene = document.getElementById('scene');
const hint = document.getElementById('hint');
const CARD_COUNT = 9;
const cards = [];

function buildCard(index) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.zIndex = CARD_COUNT - index;
  card.style.transform = `translate(${index * -1.2}px, ${index * 1.2}px) rotate(${(index % 2 === 0 ? 1 : -1) * (index * 0.6)}deg)`;

  card.innerHTML = `
    <div class="card-inner">
      <div class="face back"></div>
      <div class="face front">
        <div class="front-inner">
          <div class="front-face">
            <div class="date">2 июля</div>
            <button class="btn slot-btn" type="button">Выбрать слот</button>
          </div>
          <div class="front-back-face">
            <div class="slot-title">Остался только один свободный слот</div>
            <div class="slot-time">15:30 — 19:30</div>
            <button class="btn delight-btn" type="button">Восторг!</button>
            <button class="btn invite-btn" type="button" style="display:none;">Пригласить на капучино</button>
            <div class="loading-wrap">
              <div class="spinner"></div>
              <div class="loading-text"></div>
            </div>
            <a class="btn go-btn" href="#" target="_blank" rel="noopener" style="display:none;">Перейти к намёку</a>
          </div>
        </div>
      </div>
    </div>
  `;
  return card;
}

for (let i = 0; i < CARD_COUNT; i++) {
  const card = buildCard(i);
  scene.appendChild(card);
  cards.push(card);
}

let stage = 0; // 0 = idle, 1 = shuffled, 2 = revealed

function restPosition(i) {
  return `translate(${i * -1.2}px, ${i * 1.2}px) rotate(${(i % 2 === 0 ? 1 : -1) * (i * 0.6)}deg)`;
}

function shuffleAnimation() {
  // Riffle shuffle: deck splits into two halves that arc to the sides,
  // then the halves riffle back together card by card, alternating.
  const half = Math.ceil(cards.length / 2);

  // Phase 1: split into two stacks, lifted and fanned slightly, like a riffle grip
  cards.forEach((card, i) => {
    const inLeft = i < half;
    const localIndex = inLeft ? i : i - half;
    const dir = inLeft ? -1 : 1;
    card.style.transition = 'transform 0.32s cubic-bezier(.3,.1,.3,1)';
    card.style.transform =
      `translate(${dir * 95}px, ${-50 - localIndex * 1.5}px) rotate(${dir * (14 + localIndex * 0.8)}deg)`;
  });

  // Phase 2: each half "riffles" -- cards bend up briefly in quick alternating succession
  setTimeout(() => {
    const riffleStep = 45;
    cards.forEach((card, i) => {
      const inLeft = i < half;
      const localIndex = inLeft ? i : i - half;
      const dir = inLeft ? -1 : 1;
      setTimeout(() => {
        card.style.transition = 'transform 0.18s ease-out';
        card.style.transform =
          `translate(${dir * 60}px, ${-90 - localIndex * 1.5}px) rotate(${dir * (8 + localIndex * 0.5)}deg) scale(1.03)`;
      }, localIndex * riffleStep);
    });
  }, 360);

  // Phase 3: interleave the two halves back together, alternating cards, with a little drop/bounce
  const interleaveStart = 360 + half * 45 + 150;
  const order = [];
  for (let i = 0; i < half; i++) {
    if (i < cards.length - half) order.push(half + i); // from right half
    order.push(i); // from left half
  }
  order.forEach((cardIndex, step) => {
    const card = cards[cardIndex];
    setTimeout(() => {
      card.style.transition = 'transform 0.22s cubic-bezier(.4,.2,.2,1)';
      card.style.zIndex = CARD_COUNT + step;
      card.style.transform = `translate(0px, -6px) rotate(${(step % 2 === 0 ? 1 : -1) * 4}deg) scale(1.02)`;
    }, interleaveStart + step * 55);
  });

  // Phase 4: settle into the final neat stack
  const settleStart = interleaveStart + order.length * 55 + 120;
  cards.forEach((card, i) => {
    setTimeout(() => {
      card.style.transition = 'transform 0.35s cubic-bezier(.3,.2,.2,1)';
      card.style.zIndex = CARD_COUNT - i;
      card.style.transform = restPosition(i);
    }, settleStart);
  });

  hint.textContent = 'Перемешиваю...';
  setTimeout(() => {
    hint.textContent = 'Нажми ещё раз';
  }, settleStart + 400);
}

function revealTopCard() {
  const topCard = cards[cards.length - 1];
  topCard.classList.add('flipped');
  topCard.style.zIndex = CARD_COUNT + 1;
  topCard.style.transform = `translate(0px, -10px) scale(1.05)`;
  hint.style.display = 'none';
}

const INVITE_STEPS = [
  { text: 'Собираем информацию о лучших кофейнях Москвы', duration: 5000 },
  { text: 'Ищем кофейни, где вы сможете прилечь', duration: 5000 },
  { text: 'Ого, мы нашли кое-что интересное по теме «Капучино»', duration: 5000 },
  { text: 'Проверяем наличие свободных мест', duration: 5000 },
  { text: 'Еще чуть-чуть', duration: 10000 },
];

const INVITE_URL = 'https://reservationsteps.ru/rooms/index/37e9ba99-bc64-463d-ac21-4fcdd570c70c?dfrom=02-07-2026&dto=03-07-2026&padding=20&lang=ru&currency=RUB&promoCode=%D0%A1%D0%90%D0%99%D0%A2&utm_source=YandexMaps_hotel&uid=37e9ba99-bc64-463d-ac21-4fcdd570c70c';

function runInviteSequence(face) {
  const slotTitle = face.querySelector('.slot-title');
  const slotTime = face.querySelector('.slot-time');
  const inviteBtn = face.querySelector('.invite-btn');
  const loadingWrap = face.querySelector('.loading-wrap');
  const loadingText = face.querySelector('.loading-text');
  const goBtn = face.querySelector('.go-btn');

  slotTitle.style.display = 'none';
  slotTime.style.display = 'none';
  inviteBtn.style.display = 'none';
  loadingWrap.style.display = 'flex';

  function showStep(index) {
    if (index >= INVITE_STEPS.length) {
      loadingWrap.style.display = 'none';
      goBtn.href = INVITE_URL;
      goBtn.style.display = 'inline-block';
      return;
    }
    loadingText.classList.remove('visible');
    setTimeout(() => {
      loadingText.textContent = INVITE_STEPS[index].text;
      loadingText.classList.add('visible');
      setTimeout(() => showStep(index + 1), INVITE_STEPS[index].duration);
    }, 300);
  }

  showStep(0);
}

scene.addEventListener('click', (e) => {
  const slotBtn = e.target.closest('.slot-btn');
  if (slotBtn) {
    e.stopPropagation();
    const inner = slotBtn.closest('.card').querySelector('.front-inner');
    inner.classList.add('slot-flipped');
    return;
  }

  const delightBtn = e.target.closest('.delight-btn');
  if (delightBtn) {
    e.stopPropagation();
    const inviteBtn = delightBtn.closest('.front-back-face').querySelector('.invite-btn');
    delightBtn.style.display = 'none';
    inviteBtn.style.display = 'inline-block';
    return;
  }

  const inviteBtn = e.target.closest('.invite-btn');
  if (inviteBtn) {
    e.stopPropagation();
    runInviteSequence(inviteBtn.closest('.front-back-face'));
    return;
  }

  if (stage === 0) {
    shuffleAnimation();
    stage = 1;
  } else if (stage === 1) {
    revealTopCard();
    stage = 2;
  }
});
</script>
